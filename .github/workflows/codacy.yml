name: Django Codacy Coverage

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install django coverage pytest-cov

      - name: Run Tests and Generate XML
        run: |
          # 1. Tests run karein
          coverage run manage.py test
          # 2. Report ko XML format mein convert karein (Codacy ke liye zaroori hai)
          coverage xml

      - name: Check if File Exists (Debug)
        run: ls -R  # Ye command logs mein dikhayegi ke coverage.xml kahan bani hai

      - name: Run Codacy Coverage Reporter
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
