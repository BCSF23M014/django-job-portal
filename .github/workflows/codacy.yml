name: Django Codacy Coverage

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install django coverage pytest-cov django-environ
          # Agar koi aur missing module ho toh requirements se install ho jayega
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests and Generate XML
        run: |
          # Django settings load karne ke liye environment variables agar chahiye hon toh yahan dein
          # Maslan: export DEBUG=True
          coverage run manage.py test
          coverage xml

      - name: Run Codacy Coverage Reporter
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
