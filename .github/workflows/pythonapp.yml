name: job-portal

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - run: |
        git fetch --prune --unshallow

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # django-environ aur coverage tools lazmi install karein
        pip install -r requirements.txt
        pip install coverage django-environ 

    # Black wala step humne hata diya hai taake "Failure" khatam ho jaye
    
    - name: Run tests and Generate Coverage
      run: |
        python manage.py collectstatic --noinput
        # 'coverage' command use kar rahe hain taake report ban sake
        coverage run manage.py test
        coverage xml -o coverage.xml

    - name: Run Codacy Coverage Reporter
      uses: codacy/codacy-coverage-reporter-action@v1
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        coverage-reports: coverage.xml
